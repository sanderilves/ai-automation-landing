[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://calendly.com; frame-src https://calendly.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline';"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/workflow.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    [[redirects]]
  from = "/privacy-policy.html"
  to = "/privacy-policy"
  status = 301
